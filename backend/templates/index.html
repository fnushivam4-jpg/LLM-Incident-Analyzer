<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Debugging Copilot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        .btn-primary { background-color: #007bff; border-color: #007bff; }
        .btn-primary:hover { background-color: #0056b3; border-color: #0056b3; }
        #results { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h1 class="h4 mb-0">🧠 LLM Debugging Copilot</h1>
                    </div>
                    <div class="card-body">
                        <p class="text-muted">Analyze backend incidents by entering a request ID. The system will bundle related logs and use AI to identify root causes.</p>
                        <form id="analyzeForm">
                            <div class="mb-3">
                                <label for="requestId" class="form-label">Request ID</label>
                                <input type="text" id="requestId" name="request_id" class="form-control" required placeholder="e.g., 123e4567-e89b-12d3-a456-426614174000">
                            </div>
                            <button type="submit" class="btn btn-primary">Analyze Logs</button>
                        </form>
                        <div id="results" class="mt-4" style="display: none;">
                            <h5>Analysis Results</h5>
                            <pre class="bg-light p-3 rounded"><code id="resultsContent"></code></pre>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('analyzeForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            const requestId = document.getElementById('requestId').value;
            const resultsDiv = document.getElementById('results');
            const resultsContent = document.getElementById('resultsContent');
            resultsDiv.style.display = 'none';
            resultsContent.textContent = 'Analyzing...';
            resultsDiv.style.display = 'block';

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ request_id: requestId })
                });
                const data = await response.json();
                if (response.ok) {
                    resultsContent.textContent = JSON.stringify(data, null, 2);
                } else {
                    resultsContent.textContent = 'Error: ' + data.error;
                }
            } catch (error) {
                resultsContent.textContent = 'Network error: ' + error.message;
            }
        });
    </script>
</body>
</html>
